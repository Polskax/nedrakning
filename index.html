<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nedräkning – 5 maj 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: rgba(255,255,255,0.07);
    --accent: #c8a96e;
    --text: #f0ece4;
    --muted: rgba(240,236,228,0.4);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }

  .bg-lines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255,255,255,0.025) 80px),
      repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255,255,255,0.025) 80px);
  }

  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(200,169,110,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 680px;
    width: 100%;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.1s forwards;
  }

  .headline {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 400;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.25s forwards;
  }

  .headline em {
    color: var(--accent);
    font-style: italic;
  }

  .boxes {
    display: flex;
    justify-content: center;
    gap: 1px;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.4s forwards;
  }

  .box {
    background: var(--surface);
    border: 0.5px solid var(--border);
    padding: 2rem 1.5rem 1.5rem;
    flex: 1;
    max-width: 150px;
    position: relative;
  }

  .box:first-child { border-radius: 4px 0 0 4px; }
  .box:last-child { border-radius: 0 4px 4px 0; }

  .box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .num {
    font-family: 'DM Mono', monospace;
    font-size: clamp(2.5rem, 6vw, 3.5rem);
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    display: block;
    transition: opacity 0.1s;
  }

  .sep {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    color: var(--accent);
    opacity: 0.3;
    align-self: center;
    padding-bottom: 1rem;
    flex: none;
    line-height: 1;
  }

  .lbl {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.75rem;
    display: block;
  }

  .footer {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.55s forwards;
  }

  .dot { color: var(--accent); margin: 0 0.5rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tick { animation: pulse 0.15s ease; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

  @media (max-width: 480px) {
    .boxes { gap: 1px; }
    .box { padding: 1.25rem 0.75rem 1rem; }
    .sep { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="bg-lines"></div>
<div class="glow"></div>

<div class="container">
  <div class="eyebrow">Nedräkning</div>
  <h1 class="headline">Den <em>5 maj 2026</em><br>är det dags</h1>

  <div class="boxes">
    <div class="box">
      <span class="num" id="d">00</span>
      <span class="lbl">dagar</span>
    </div>
    <div class="sep" style="display:flex;align-items:center;padding-bottom:1.5rem;">·</div>
    <div class="box">
      <span class="num" id="h">00</span>
      <span class="lbl">timmar</span>
    </div>
    <div class="sep" style="display:flex;align-items:center;padding-bottom:1.5rem;">·</div>
    <div class="box">
      <span class="num" id="m">00</span>
      <span class="lbl">minuter</span>
    </div>
    <div class="sep" style="display:flex;align-items:center;padding-bottom:1.5rem;">·</div>
    <div class="box">
      <span class="num" id="s">00</span>
      <span class="lbl">sekunder</span>
    </div>
  </div>

  <div class="footer" id="now"></div>
</div>

<script>
  const target = new Date('2026-05-05T00:00:00');
  const els = {
    d: document.getElementById('d'),
    h: document.getElementById('h'),
    m: document.getElementById('m'),
    s: document.getElementById('s'),
    now: document.getElementById('now')
  };

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) {
      document.querySelector('.headline').innerHTML = 'Det är <em>dags!</em>';
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const mi = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    els.d.textContent = pad(d);
    els.h.textContent = pad(h);
    els.m.textContent = pad(mi);

    const prev = els.s.textContent;
    els.s.textContent = pad(s);
    if (prev !== pad(s)) {
      els.s.classList.remove('tick');
      void els.s.offsetWidth;
      els.s.classList.add('tick');
    }

    els.now.textContent = now.toLocaleString('sv-SE');
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
